# Render Blueprint: https://render.com/docs/blueprint-spec
# Push to GitHub/GitLab, then New → Blueprint → select repo.

databases:
  - name: taktakaha-db
    databaseName: taktakaha
    user: taktakaha
    plan: free

services:
  - type: web
    name: taktakaha
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && bash build.sh
    # ASGI (Daphne) is required for WebSocket / Django Channels. Set REDIS_URL for multi-instance.
    startCommand: daphne -b 0.0.0.0 -p $PORT smart_quiz_arena.asgi:application
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DEBUG
        value: "false"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: SECRET_KEY
        generateValue: true
      - key: SEED_ON_BUILD
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: taktakaha-db
          property: connectionString
      # Create a Render Redis instance and paste its URL here (required for Channels in production):
      - key: REDIS_URL
        sync: false
      # After first deploy, set this to your real URL (HTTPS) to fix CSRF on login:
      # Environment → Add: CSRF_TRUSTED_ORIGINS = https://taktakaha.onrender.com
